# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/playwright-tests.yml
# ─────────────────────────────────────────────────────────────────────────────

name: Playwright E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  # ── Critical: ensures Python can find pages/, utils/, etc. in CI ──────────
  PYTHONPATH: ${{ github.workspace }}

jobs:
  test:
    name: "Tests – ${{ matrix.browser }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium, firefox, webkit ]

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # ── 3. Python dependencies ────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4a. OS-level dependencies (Ubuntu 24.04 package rename fix) ───────
      # ubuntu-latest = Ubuntu 24.04 (Noble). It renamed:
      #   libasound2  →  libasound2t64
      #   libevent-2.1-7  →  libevent-2.1-7t64
      # Playwright's --with-deps still uses the OLD names and fails.
      # Fix: install OS deps manually with correct names, then install
      # browsers WITHOUT --with-deps.
      - name: Install OS browser dependencies (Ubuntu 24.04 fix)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libasound2t64 \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0 \
            libwoff1 \
            libvpx9 \
            libevent-2.1-7t64 \
            libopus0 \
            libharfbuzz-icu0 \
            libhyphen0 \
            libmanette-0.2-0 \
            libflite1 \
            gstreamer1.0-plugins-bad \
            libgles2 \
            libenchant-2-2 \
            libsecret-1-0 \
            libnotify4 \
            xvfb \
            fonts-liberation \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            libxshmfence1

      # ── 4b. Playwright browsers (no --with-deps; OS deps done above) ──────
      - name: Install Playwright browsers
        run: playwright install ${{ matrix.browser }}

      # ── 5. Create output directories ──────────────────────────────────────
      - name: Create output directories
        run: mkdir -p reports screenshots

      # ── 6. Verify test collection BEFORE running (debug helper) ───────────
      # If this step shows "0 tests collected" we know it is a path/import
      # issue rather than a test logic failure.
      - name: Verify pytest collects tests
        run: |
          echo "=== Python path ==="
          python -c "import sys; [print(p) for p in sys.path]"
          echo "=== Collected tests ==="
          pytest tests/ --collect-only -q
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── 7. Run tests ──────────────────────────────────────────────────────
      - name: Run Playwright tests (${{ matrix.browser }})
        run: |
          pytest tests/ \
            --browser=${{ matrix.browser }} \
            --html=reports/report_${{ matrix.browser }}.html \
            --self-contained-html \
            -v \
            --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

      # ── 8. Upload HTML report ─────────────────────────────────────────────
      - name: Upload HTML report (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report-${{ matrix.browser }}
          path: reports/report_${{ matrix.browser }}.html
          retention-days: 30

      # ── 9. Upload screenshots (only present on failure) ───────────────────
      - name: Upload screenshots (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.browser }}
          path: screenshots/
          retention-days: 30
          if-no-files-found: ignore

      # ── 10. Upload logs ───────────────────────────────────────────────────
      - name: Upload execution log (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: execution-log-${{ matrix.browser }}
          path: reports/
          retention-days: 30
          if-no-files-found: ignore