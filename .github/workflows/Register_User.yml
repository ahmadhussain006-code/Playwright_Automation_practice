# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/playwright-tests.yml
#
# Runs Playwright tests on Chromium · Firefox · WebKit in parallel.
#
# Fixes included:
#   1. PYTHONPATH set to workspace root so pages/ and utils/ are importable
#   2. OS deps installed manually (Ubuntu 24.04 renamed libasound2 → libasound2t64)
#   3. playwright install without --with-deps (OS deps handled in step above)
#   4. pytest runs from workspace root (no tests/ subfolder assumed)
# ─────────────────────────────────────────────────────────────────────────────

name: Playwright E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  test:
    name: "Tests – ${{ matrix.browser }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium, firefox, webkit ]

    steps:

      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # ── 3. Install Python packages ────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Install OS-level browser dependencies ──────────────────────────
      # ubuntu-latest = Ubuntu 24.04 (Noble) which renamed:
      #   libasound2       → libasound2t64
      #   libevent-2.1-7   → libevent-2.1-7t64
      # Playwright --with-deps uses the OLD names and fails with exit code 100.
      # Solution: install correct packages manually, then use playwright install
      # WITHOUT --with-deps.
      - name: Install OS browser dependencies (Ubuntu 24.04 fix)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libasound2t64 \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0 \
            libwoff1 \
            libvpx9 \
            libevent-2.1-7t64 \
            libopus0 \
            libharfbuzz-icu0 \
            libhyphen0 \
            libmanette-0.2-0 \
            libflite1 \
            gstreamer1.0-plugins-bad \
            libgles2 \
            libenchant-2-2 \
            libsecret-1-0 \
            libnotify4 \
            xvfb \
            fonts-liberation \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            libxshmfence1

      # ── 5. Install Playwright browser (no --with-deps) ────────────────────
      - name: Install Playwright browsers
        run: playwright install ${{ matrix.browser }}

      # ── 6. Create output directories ──────────────────────────────────────
      - name: Create output directories
        run: mkdir -p reports screenshots

      # ── 7. Debug – verify pytest can find and collect tests ───────────────
      # If this prints "0 items" we have an import or path problem – fix that
      # before looking at the actual test results.
      - name: Debug – show Python path and collected tests
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Files in root ==="
          ls -la
          echo "=== Python sys.path ==="
          python -c "import sys; [print(p) for p in sys.path]"
          echo "=== Tests collected by pytest ==="
          pytest --collect-only -q
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── 8. Run tests ──────────────────────────────────────────────────────
      - name: Run Playwright tests (${{ matrix.browser }})
        run: |
          pytest \
            --browser=${{ matrix.browser }} \
            --html=reports/report_${{ matrix.browser }}.html \
            --self-contained-html \
            -v \
            --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

      # ── 9. Upload HTML report ─────────────────────────────────────────────
      - name: Upload HTML report (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report-${{ matrix.browser }}
          path: reports/report_${{ matrix.browser }}.html
          retention-days: 30

      # ── 10. Upload screenshots (only present when tests fail) ─────────────
      - name: Upload screenshots (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.browser }}
          path: screenshots/
          retention-days: 30
          if-no-files-found: ignore

      # ── 11. Upload execution logs ─────────────────────────────────────────
      - name: Upload execution logs (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: execution-log-${{ matrix.browser }}
          path: reports/
          retention-days: 30
          if-no-files-found: ignore