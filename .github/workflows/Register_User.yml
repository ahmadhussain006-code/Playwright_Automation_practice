# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/playwright-tests.yml
# Runs Playwright tests on Chromium · Firefox · WebKit in parallel.
#
# Fixes included:
#   v1 – Ubuntu 24.04 libasound2 → libasound2t64 rename
#   v2 – PYTHONPATH / testpaths so CI collects tests
#   v3 – wait_for_load_state after Create Account for headless CI
#   v4 – Updated all actions to latest versions (Node.js 24 compatible)
#        Increased timeouts for Firefox and WebKit (slower renderers)
# ─────────────────────────────────────────────────────────────────────────────

name: Playwright E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  test:
    name: "Tests – ${{ matrix.browser }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium, firefox, webkit ]

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────
      # Updated to actions/checkout@v4 (Node.js 24 compatible – no deprecation warning)
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────
      # Updated to actions/setup-python@v5 (Node.js 24 compatible)
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # ── 3. Python packages ────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. OS-level dependencies (Ubuntu 24.04 package rename fix) ────────
      # Ubuntu 24.04 renamed libasound2 → libasound2t64
      # Playwright --with-deps uses the old name and fails (exit code 100)
      # Fix: install correct packages manually, then playwright install WITHOUT --with-deps
      - name: Install OS browser dependencies (Ubuntu 24.04 fix)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libasound2t64 \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0 \
            libwoff1 \
            libvpx9 \
            libevent-2.1-7t64 \
            libopus0 \
            libharfbuzz-icu0 \
            libhyphen0 \
            libmanette-0.2-0 \
            libflite1 \
            gstreamer1.0-plugins-bad \
            libgles2 \
            libenchant-2-2 \
            libsecret-1-0 \
            libnotify4 \
            xvfb \
            fonts-liberation \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            libxshmfence1

      # ── 5. Playwright browsers (no --with-deps; OS deps done above) ───────
      - name: Install Playwright browsers
        run: playwright install ${{ matrix.browser }}

      # ── 6. Create output directories ──────────────────────────────────────
      - name: Create output directories
        run: mkdir -p reports screenshots

      # ── 7. Debug – verify pytest collects tests ───────────────────────────
      - name: Debug – verify test collection
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Files in root ==="
          ls -la
          echo "=== Collected tests ==="
          pytest --collect-only -q
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── 8. Run tests ──────────────────────────────────────────────────────
      # Firefox and WebKit get a longer timeout via env var because they are
      # slower to render than Chromium in headless CI environments.
      - name: Run Playwright tests (${{ matrix.browser }})
        run: |
          pytest \
            --browser=${{ matrix.browser }} \
            --html=reports/report_${{ matrix.browser }}.html \
            --self-contained-html \
            -v \
            --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}
          # Give Firefox/WebKit extra time – they are slower than Chromium
          PLAYWRIGHT_TIMEOUT: ${{ matrix.browser == 'chromium' && '30000' || '60000' }}
        continue-on-error: true

      # ── 9. Upload HTML report ─────────────────────────────────────────────
      # Updated to actions/upload-artifact@v4 (Node.js 24 compatible)
      - name: Upload HTML report (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report-${{ matrix.browser }}
          path: reports/report_${{ matrix.browser }}.html
          retention-days: 30

      # ── 10. Upload screenshots ────────────────────────────────────────────
      - name: Upload screenshots (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.browser }}
          path: screenshots/
          retention-days: 30
          if-no-files-found: ignore

      # ── 11. Upload logs ───────────────────────────────────────────────────
      - name: Upload execution logs (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: execution-log-${{ matrix.browser }}
          path: reports/
          retention-days: 30
          if-no-files-found: ignore