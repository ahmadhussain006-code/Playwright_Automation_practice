# ─────────────────────────────────────────────────────────────────────────────
# pytest.ini  –  Central configuration for the entire test suite
# ─────────────────────────────────────────────────────────────────────────────

[pytest]

# ── Python path fix (CRITICAL for CI) ────────────────────────────────────────
# Adds the project root to sys.path so that imports like
#   from pages.home_page import HomePage
#   from utils.helpers import ...
# work correctly both locally (PyCharm) AND in GitHub Actions CI.
pythonpath = .

# ── Where Pytest should look for tests ───────────────────────────────────────
# Using . (project root) because test files sit at the root level.
# Change to "tests" if you later move test files into a tests/ subfolder.
testpaths = .

# ── Test file / class / function naming conventions ──────────────────────────
python_files    = test_*.py
python_classes  = Test*
python_functions = test_*

# ── CLI flags applied automatically to every run ─────────────────────────────
addopts =
    -v
    --tb=short
    -p no:warnings

# ── Custom markers ────────────────────────────────────────────────────────────
markers =
    smoke:      Quick sanity checks (subset of regression)
    regression: Full regression suite
    register:   Tests related to user registration flow

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli             = true
log_cli_level       = INFO
log_cli_format      = %(asctime)s [%(levelname)s] %(name)s – %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file             = reports/test_execution.log
log_file_level       = DEBUG
log_file_format      = %(asctime)s [%(levelname)s] %(name)s – %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S