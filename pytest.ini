# ─────────────────────────────────────────────────────────────────────────────
# pytest.ini  –  Central configuration for the entire test suite
# ─────────────────────────────────────────────────────────────────────────────

[pytest]

# ── Where Pytest should look for tests ───────────────────────────────────────
testpaths = tests

# ── Test file / class / function naming conventions ──────────────────────────
python_files    = test_*.py
python_classes  = Test*
python_functions = test_*

# ── CLI flags applied automatically to every run ─────────────────────────────
# -v           : verbose output (test names + PASS/FAIL)
# --tb=short   : short traceback on failures (easier to read)
# -p no:warnings : suppress noisy deprecation warnings
addopts =
    -v
    --tb=short
    -p no:warnings

# ── Custom markers (avoids "PytestUnknownMarkWarning") ───────────────────────
markers =
    smoke:      Quick sanity checks (subset of regression)
    regression: Full regression suite
    register:   Tests related to user registration flow

# ── Logging configuration (captured during test run) ─────────────────────────
log_cli            = true
log_cli_level      = INFO
log_cli_format     = %(asctime)s [%(levelname)s] %(name)s – %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file            = reports/test_execution.log
log_file_level      = DEBUG
log_file_format     = %(asctime)s [%(levelname)s] %(name)s – %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S